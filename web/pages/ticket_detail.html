<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle de Ticket | Soporte Técnico ISP</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: { colors: { primary: "#3b82f6", secondary: "#64748b" } },
      },
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Auth Gate -->
  <script>
    const SUPABASE_URL = "https://itkxgkxjwulfzklxyxke.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_P2SJ7etHApOmvH2zXCeMng_hthMCXhA";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    sb.auth.getSession().then(({ data, error }) => {
      if (error || !data.session) window.location.replace("login.html");
    });
  </script>
</head>

<body class="bg-slate-50 text-slate-900 h-screen overflow-y-auto">
  <!-- TOP -->
  <header class="top-bar">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="./kanban.html" class="text-slate-500 hover:text-blue-600 text-sm font-medium">← Volver</a>
        <h1 class="text-lg font-bold text-slate-800">Detalle del Ticket</h1>
      </div>
      <div class="text-xs text-slate-400" id="ticketIdBadge"></div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6 space-y-6 pb-16">
    <!-- Card detalle -->
    <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
      <div class="flex items-start justify-between gap-4">
        <div>
          <div class="text-xs text-slate-400">Cliente</div>
          <div id="clientName" class="text-xl font-bold text-slate-800">—</div>
          <div id="title" class="mt-1 text-sm text-slate-600">—</div>
        </div>

        <div class="flex flex-col items-end gap-2">
          <div id="statusPill" class="text-[11px] font-bold uppercase px-2 py-1 rounded-full bg-slate-100 text-slate-700">—</div>
          <div id="priorityPill" class="text-[11px] font-bold uppercase px-2 py-1 rounded-full bg-slate-100 text-slate-700">—</div>
        </div>
      </div>

      <div class="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm">
        <div class="bg-slate-50 border border-slate-200 rounded-xl p-3">
          <div class="text-[11px] text-slate-400">Zona</div>
          <div id="zone" class="font-semibold text-slate-800">—</div>
        </div>
        <div class="bg-slate-50 border border-slate-200 rounded-xl p-3">
          <div class="text-[11px] text-slate-400">Bloque horario</div>
          <div id="timeBlock" class="font-semibold text-slate-800">—</div>
        </div>
        <div class="bg-slate-50 border border-slate-200 rounded-xl p-3">
          <div class="text-[11px] text-slate-400">Cliente tipo</div>
          <div id="clientType" class="font-semibold text-slate-800">—</div>
        </div>
      </div>

      <div class="mt-4">
        <div class="flex items-center justify-between gap-3">
          <div class="text-[11px] text-slate-400">Descripción</div>
          <div class="flex items-center gap-2">
            <button id="editDescBtn" class="text-xs text-blue-600 font-bold hover:underline" type="button">Editar</button>
            <button id="saveDescBtn" class="hidden px-3 py-1 rounded-lg bg-blue-600 text-white text-xs font-bold hover:bg-blue-700 transition" type="button">Guardar</button>
            <button id="cancelDescBtn" class="hidden px-3 py-1 rounded-lg bg-slate-100 text-slate-700 text-xs font-bold hover:bg-slate-200 transition" type="button">Cancelar</button>
          </div>
        </div>

        <div id="description" class="text-sm text-slate-700 mt-1 whitespace-pre-wrap">—</div>

        <textarea id="descriptionEdit" class="hidden mt-2 w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500" rows="4" placeholder="Escribe la descripción..."></textarea>

        <div id="descSaveHint" class="hidden mt-2 text-xs text-slate-400">
          Tip: al guardar se actualizará en Supabase y puedes registrar una nota en bitácora.
        </div>
      </div>
    </section>

    <div class="bg-white rounded-3xl border border-slate-200 p-6">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-lg font-extrabold text-slate-900">Materiales</div>
          <div class="text-sm text-slate-500">
            Aquí aparecen movimientos de inventario que se registraron con el <span class="font-mono">ticket_id</span> de este ticket.
          </div>
        </div>

        <div class="flex items-center gap-3">
          <button id="btnAddMaterial" class="px-4 py-2 rounded-xl bg-blue-600 text-white font-bold text-sm hover:bg-blue-700 transition" type="button">+ Agregar material</button>
        </div>
      </div>

      <div class="mt-4">
        <div id="materialsList" class="space-y-3"></div>
      </div>
    </div>

    <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
      <div class="flex items-center justify-between">
        <h2 class="text-sm font-bold text-slate-800">Bitácora</h2>
      </div>

      <div class="mt-3 flex flex-col sm:flex-row gap-2">
        <input id="noteInput" type="text" placeholder="Escribe una nota rápida…" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500" />
        <button id="addNoteBtn" class="px-4 py-2 rounded-xl bg-blue-600 text-white text-sm font-bold hover:bg-blue-700 transition" type="button">Agregar</button>
      </div>

      <div id="notesList" class="mt-4 space-y-3"></div>
    </section>
  </main>

  <script type="module" src="../js/ticket-detail.js"></script>
</body>
</html>
