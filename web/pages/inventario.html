  <style>
    /* --- Bottom tab bar sizing (thinner bar + slightly smaller icons) --- */
    :root{ --bottomNavH: 72px; --brandBlue: #2563eb; }

    .bottom-nav{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--bottomNavH);
      padding-top: 6px !important;   /* icons breathe from the top */
      padding-bottom: 8px !important;
      background: var(--brandBlue) !important;
      border-top: 0 !important;
      z-index: 50;
    }

    .bottom-nav .bottom-nav-inner{
      height: 100%;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 760px; /* bring left/right tabs closer to center */
      margin-left: auto;
      margin-right: auto;
    }

    .bottom-nav svg{ width: 30px !important; height: 30px !important; }

    /* Icon wrapper: keep for centering, but no boxes around icons */
    .bottom-nav .tab-icon{
      width: auto !important;
      height: auto !important;
      border-radius: 0 !important;
      background: transparent !important;
      border: 0 !important;
      padding: 0 !important;
    }

    .bottom-nav .tab-label{ font-size: 9px !important; line-height: 1 !important; margin-top: 6px !important; }
    .bottom-nav a{ gap: 2px !important; }

    /* Ensure content doesn't reserve an oversized space for the nav */
    main.main-content{ padding-bottom: var(--bottomNavH) !important; }

    /* --- Bottom nav: white icons/labels --- */
    .bottom-nav a{ color: rgba(255,255,255,.85) !important; }
    .bottom-nav a:hover{ color: #fff !important; }
    .bottom-nav a svg{ stroke: currentColor !important; }
    .bottom-nav .tab-label{ color: currentColor !important; }

    /* Active tab */
    .bottom-nav a.text-blue-600{ color: #fff !important; }

    /* Inactive tabs */
    .bottom-nav a.text-slate-400{ color: rgba(255,255,255,.75) !important; }

    /* --- TOP BAR: same blue as bottom bar --- */
    header.top-bar{
      background: var(--brandBlue) !important;
      border-bottom: 0 !important;
    }

    /* Slimmer bar + spacing like Kanban */
    header.top-bar .top-inner{
      padding: 8px 24px 8px !important;
      gap: 6px !important;
    }

    header.top-bar .top-actions{
      margin-top: 18px !important;
      margin-right: 28px !important;
    }

    header.top-bar .top-filters{ margin-top: -6px !important; }

    /* Avatar translucent on blue */
    header.top-bar .top-avatar{
      background: rgba(255,255,255,.12) !important;
      border-color: rgba(255,255,255,.22) !important;
      color: #ffffff !important;
    }
    header.top-bar .top-avatar:hover{ background: rgba(255,255,255,.18) !important; }

    /* Make top bar text white */
    header.top-bar,
    header.top-bar h1,
    header.top-bar a,
    header.top-bar button,
    header.top-bar input,
    header.top-bar select{
      color: #ffffff !important;
    }

    header.top-bar svg{ stroke: currentColor !important; }

    /* Slightly smaller elements */
    header.top-bar h1{ font-size: 1.05rem !important; }

    header.top-bar .top-actions svg{ width: 24px !important; height: 24px !important; }

    header.top-bar .top-avatar{
      width: 30px !important;
      height: 30px !important;
      font-size: 11px !important;
    }

    header.top-bar input,
    header.top-bar select{
      padding-top: 6px !important;
      padding-bottom: 6px !important;
      font-size: 12px !important;
      background: rgba(255,255,255,.14) !important;
      border: 1px solid rgba(255,255,255,.22) !important;
    }

    header.top-bar select option{ color: #0f172a; }

    header.top-bar #searchInput{ width: 240px !important; }

    header.top-bar .top-actions button,
    header.top-bar .top-actions a{
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

      const customWrap = document.getElementById("nm_customCategoryWrap");
      const customInput = document.getElementById("nm_customCategory");

      const nameInput = document.getElementById("nm_name");
      const qtyInput = document.getElementById("nm_qty");
      const unitInput = document.getElementById("nm_unit");
      const notesInput = document.getElementById("nm_notes");
      const errorBox = document.getElementById("nm_error");

      if (!modal || !btnOpen || !form) return;

      function showError(msg) {
        if (!errorBox) return;
        errorBox.textContent = msg;
        errorBox.classList.remove("hidden");
      }

      function clearError() {
        if (!errorBox) return;
        errorBox.textContent = "";
        errorBox.classList.add("hidden");
      }

      function openModal() {
        clearError();
        modal.classList.remove("hidden");
        modal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        setTimeout(() => nameInput && nameInput.focus(), 0);
      }

      function closeModal() {
        modal.classList.add("hidden");
        modal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
        form.reset();
        customWrap.classList.add("hidden");
        clearError();
      }

      btnOpen.addEventListener("click", openModal);
      backdrop && backdrop.addEventListener("click", closeModal);
      btnClose && btnClose.addEventListener("click", closeModal);
      btnCancel && btnCancel.addEventListener("click", closeModal);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !modal.classList.contains("hidden")) closeModal();
      });

      selCategory && selCategory.addEventListener("change", () => {
        const isOther = selCategory.value === "Otro";
        customWrap.classList.toggle("hidden", !isOther);
        if (isOther) setTimeout(() => customInput && customInput.focus(), 0);
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        clearError();

        const name = (nameInput?.value || "").trim();
        const qty = Number(qtyInput?.value || 0);
        const unit = (unitInput?.value || "pza").trim();
        const categoryBase = (selCategory?.value || "").trim();
        const customCategory = (customInput?.value || "").trim();
        const category = categoryBase === "Otro" ? customCategory : categoryBase;
        const notes = (notesInput?.value || "").trim();

        if (!name) return showError("Escribe el nombre del material.");
        if (!category) return showError("Selecciona una categoría (o escribe una personalizada).");
        if (Number.isNaN(qty)) return showError("La cantidad inicial no es válida.");

        // Evita doble envío (Enter + click / doble click)
        const submitBtn = form.querySelector('button[type="submit"]');
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.classList.add("opacity-70", "cursor-not-allowed");
        }

        const payload = { name, category, qty, unit, notes };

        const unlock = () => {
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.classList.remove("opacity-70", "cursor-not-allowed");
          }
        };

        // Ruta única: si existe la función global, úsala.
        // Si no existe, emite el evento para que `inventory.js` lo maneje.
        if (typeof window.createInventoryItem === "function") {
          Promise.resolve(window.createInventoryItem(payload))
            .then(() => {
              unlock();
              closeModal();
            })
            .catch((err) => {
              unlock();
              showError(err?.message || "No se pudo guardar el material.");
            });
          return;
        }

        window.dispatchEvent(new CustomEvent("inventory:add", { detail: payload }));
        unlock();
        closeModal();
      });
    })();
  </script>
</body>
</html>
