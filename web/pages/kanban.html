  <style>
    .kanban-column {
      min-width: 280px;
      max-width: 280px;
    }
    .custom-scrollbar::-webkit-scrollbar {
      height: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    /* --- Bottom tab bar sizing (thinner bar + slightly smaller icons) --- */
    :root{ --bottomNavH: 72px; --brandBlue: #2563eb; }

    .bottom-nav{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--bottomNavH);
      padding-top: 6px !important;   /* icons breathe from the top */
      padding-bottom: 8px !important;
    }

    .bottom-nav .bottom-nav-inner{
      height: 100%;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 760px; /* bring left/right tabs closer to center */
      margin-left: auto;
      margin-right: auto;
    }

    .bottom-nav svg{ width: 30px !important; height: 30px !important; }

    /* Icon wrapper: keep for centering, but no boxes around icons */
    .bottom-nav .tab-icon{
      width: auto !important;
      height: auto !important;
      border-radius: 0 !important;
      background: transparent !important;
      border: 0 !important;
      padding: 0 !important;
    }

    .bottom-nav .tab-label{ font-size: 9px !important; line-height: 1 !important; margin-top: 6px !important; }
    .bottom-nav a{ gap: 2px !important; }

    /* Ensure content doesn't reserve an oversized space for the nav */
    main.main-content{ padding-bottom: var(--bottomNavH) !important; }

    /* --- Bottom nav: blue background + white icons/labels --- */
    .bottom-nav{
      background: var(--brandBlue) !important; /* brand blue */
      border-top: 0 !important;
    }
    .bottom-nav a{ color: rgba(255,255,255,.85) !important; }
    .bottom-nav a:hover{ color: #fff !important; }
    .bottom-nav a svg{ stroke: currentColor !important; }
    .bottom-nav .tab-label{ color: currentColor !important; }

    /* Active tab */
    .bottom-nav a.text-blue-600{ color: #fff !important; }

    /* Inactive tabs */
    .bottom-nav a.text-slate-400{ color: rgba(255,255,255,.75) !important; }

    /* --- TOP BAR: same blue as bottom bar + red text --- */
    header.top-bar{
      background: var(--brandBlue) !important; /* match bottom nav */
      border-bottom: 0 !important;
    }

    /* Give the top bar more blue breathing room */
    header.top-bar .top-inner{
      padding: 8px 24px 8px !important; /* slimmer bar */
      gap: 6px !important;              /* bring rows closer */
    }

    header.top-bar .top-actions{
      /* Align actions (bell/gear/avatar) a bit lower and not so far right */
      margin-top: 18px !important;   /* a little more down */
      margin-right: 28px !important; /* pull in from the far right */
    }

    /* Pull the filters row a bit closer to the title */
    header.top-bar .top-filters{ margin-top: -6px !important; }

    /* Make avatar translucent on blue so white initials read well */
    header.top-bar .top-avatar{
      background: rgba(255,255,255,.12) !important;
      border-color: rgba(255,255,255,.22) !important;
      color: #ffffff !important;
    }
    header.top-bar .top-avatar:hover{
      background: rgba(255,255,255,.18) !important;
    }

    /* Make the "black" text red as requested */
    header.top-bar,
    header.top-bar h1,
    header.top-bar a,
    header.top-bar button,
    header.top-bar input,
    header.top-bar select{
      color: #ffffff !important; /* red */
    }

    header.top-bar svg{ stroke: currentColor !important; }

    /* Slightly smaller elements in the top bar */
    header.top-bar h1{ font-size: 1.05rem !important; } /* between text-lg and text-xl */

    header.top-bar .top-actions svg{ width: 24px !important; height: 24px !important; }

    header.top-bar .top-avatar{
      width: 30px !important;
      height: 30px !important;
      font-size: 11px !important;
    }

    header.top-bar input,
    header.top-bar select{
      padding-top: 6px !important;
      padding-bottom: 6px !important;
      font-size: 12px !important;
    }

    header.top-bar #searchInput{ width: 240px !important; }

    /* Keep the icons visually centered after pushing the actions down */
    header.top-bar .top-actions button,
    header.top-bar .top-actions a{
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* Inputs / selects need contrast on blue */
    header.top-bar input,
    header.top-bar select{
      background: rgba(255,255,255,.14) !important;
      border: 1px solid rgba(255,255,255,.22) !important;
    }

    header.top-bar input::placeholder{ color: rgba(255, 255, 255, 0.75) !important; }

    /* Keep dropdown options readable when opened */
    header.top-bar select option{ color: #0f172a; }

  </style>
</head>

<div
  id="editTicketModal"
  class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden"
>
  <div class="bg-white rounded-2xl w-full max-w-md p-5 shadow-xl">
    <h3 class="text-lg font-bold text-slate-800 mb-4">
      Editar ticket
    </h3>

    <form id="editTicketForm" class="space-y-3">
      <input type="hidden" id="editTicketId" />

      <!-- Cliente -->
      <div>
        <label class="block text-xs text-slate-500 mb-1">Cliente</label>
        <input
          id="editCliente"
          type="text"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"
        />
      </div>

      <!-- Zona -->
      <div>
        <label class="block text-xs text-slate-500 mb-1">Zona</label>
        <input
          id="editZona"
          type="text"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"
        />
      </div>

      <!-- Prioridad -->
      <div>
        <label class="block text-xs text-slate-500 mb-1">Prioridad</label>
        <select
          id="editPrioridad"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"
        >
          <option value="alta">Alta</option>
          <option value="media">Media</option>
          <option value="baja">Baja</option>
        </select>
      </div>

      <!-- Botones -->
      <div class="flex justify-end gap-2 pt-4">
        <button
          type="button"
          id="cancelEditTicket"
          class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700"
        >
          Guardar cambios
        </button>
      </div>
    </form>
